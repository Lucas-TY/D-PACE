<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">D-PACE dynamic position weights</title>
  <desc id="desc">Conceptual chart contrasting DFlash fixed exponential decay with D-PACE weights that shift across draft positions as the drafter improves.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
  </defs>
  <rect width="920" height="360" rx="24" fill="url(#panel)"/>
  <text x="38" y="52" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="750" fill="#0f172a">Dynamic position weights</text>
  <text x="38" y="82" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" fill="#475569">DFlash uses a fixed position schedule; D-PACE recomputes weights from the current block's accepted-length surrogate.</text>

  <g transform="translate(86,120)">
    <rect x="0" y="0" width="745" height="178" rx="16" fill="#ffffff" opacity="0.88"/>
    <line x1="52" y1="132" x2="690" y2="132" stroke="#94a3b8" stroke-width="1.4"/>
    <line x1="52" y1="20" x2="52" y2="132" stroke="#94a3b8" stroke-width="1.4"/>
    <text x="370" y="167" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="14" fill="#475569">draft position in block</text>
    <text x="-74" y="26" transform="rotate(-90)" font-family="Inter, ui-sans-serif, system-ui" font-size="14" fill="#475569">relative weight</text>

    <g stroke="#cbd5e1" stroke-width="1">
      <line x1="52" y1="104" x2="690" y2="104"/>
      <line x1="52" y1="76" x2="690" y2="76"/>
      <line x1="52" y1="48" x2="690" y2="48"/>
    </g>

    <path d="M52,34 C130,50 205,67 275,82 C350,98 430,112 520,122 C585,129 640,131 690,132" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <path d="M52,45 C140,47 220,55 300,72 C390,92 500,108 690,116" fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
    <path d="M52,63 C135,58 230,56 320,64 C430,75 535,92 690,106" fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/>
    <path d="M52,90 C150,75 255,58 360,49 C465,42 575,55 690,85" fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>

    <g font-family="Inter, ui-sans-serif, system-ui" font-size="13" fill="#334155">
      <circle cx="548" cy="33" r="5" fill="#ef4444"/>
      <text x="562" y="38">DFlash fixed decay</text>
      <circle cx="548" cy="58" r="5" fill="#2563eb"/>
      <text x="562" y="63">D-PACE early</text>
      <circle cx="548" cy="83" r="5" fill="#38bdf8"/>
      <text x="562" y="88">D-PACE mid</text>
      <circle cx="548" cy="108" r="5" fill="#22c55e"/>
      <text x="562" y="113">D-PACE later</text>
    </g>
  </g>

  <text x="86" y="326" font-family="Inter, ui-sans-serif, system-ui" font-size="13" fill="#64748b">Conceptual redraw of the paper's weight-dynamics story: as early positions improve, D-PACE can move learning signal toward later positions that limit accepted length.</text>
</svg>
