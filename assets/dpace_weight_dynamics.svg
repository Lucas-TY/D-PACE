<svg xmlns="http://www.w3.org/2000/svg" width="920" height="340" viewBox="0 0 920 340" role="img" aria-labelledby="title desc">
  <title id="title">D-PACE position-weight dynamics</title>
  <desc id="desc">Academic-style conceptual line plot contrasting DFlash fixed decay and D-PACE dynamic per-position weights.</desc>
  <rect width="920" height="340" fill="#ffffff"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="60" y="42" font-size="20" font-weight="600" fill="#111827">Position-weight dynamics</text>
    <text x="60" y="66" font-size="13" fill="#4b5563">Conceptual redraw: D-PACE recomputes weights from the current accepted-length surrogate; DFlash keeps a fixed schedule.</text>

    <g transform="translate(92,92)">
      <line x1="0" y1="190" x2="720" y2="190" stroke="#111827" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="190" stroke="#111827" stroke-width="1"/>

      <g stroke="#e5e7eb" stroke-width="1">
        <line x1="0" y1="145" x2="720" y2="145"/>
        <line x1="0" y1="100" x2="720" y2="100"/>
        <line x1="0" y1="55" x2="720" y2="55"/>
      </g>

      <g font-size="12" fill="#4b5563">
        <text x="-12" y="194" text-anchor="end">0</text>
        <text x="-12" y="104" text-anchor="end">weight</text>
        <text x="360" y="232" text-anchor="middle">draft position in block</text>
      </g>

      <path d="M0,32 C95,45 185,63 270,82 C380,108 500,134 720,162"
            fill="none" stroke="#6b7280" stroke-width="2.4" stroke-dasharray="7 5"/>
      <path d="M0,42 C92,45 180,54 270,72 C385,96 520,123 720,148"
            fill="none" stroke="#1f4e79" stroke-width="2.6"/>
      <path d="M0,73 C105,64 205,61 305,72 C430,86 555,112 720,137"
            fill="none" stroke="#2f6f9f" stroke-width="2.6"/>
      <path d="M0,122 C110,94 230,70 350,58 C480,47 600,70 720,113"
            fill="none" stroke="#0f766e" stroke-width="2.6"/>

      <g font-size="12" fill="#111827">
        <line x1="500" y1="26" x2="530" y2="26" stroke="#6b7280" stroke-width="2.4" stroke-dasharray="7 5"/>
        <text x="540" y="30">DFlash fixed decay</text>
        <line x1="500" y1="52" x2="530" y2="52" stroke="#1f4e79" stroke-width="2.6"/>
        <text x="540" y="56">D-PACE early</text>
        <line x1="500" y1="78" x2="530" y2="78" stroke="#2f6f9f" stroke-width="2.6"/>
        <text x="540" y="82">D-PACE mid</text>
        <line x1="500" y1="104" x2="530" y2="104" stroke="#0f766e" stroke-width="2.6"/>
        <text x="540" y="108">D-PACE later</text>
      </g>
    </g>

    <text x="92" y="316" font-size="12" fill="#6b7280">The schematic emphasizes the qualitative mechanism; exact curves depend on the trained drafter, block, and checkpoint.</text>
  </g>
</svg>
