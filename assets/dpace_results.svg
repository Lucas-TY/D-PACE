<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300" role="img" aria-labelledby="title desc">
  <title id="title">D-PACE relative improvements over DFlash</title>
  <desc id="desc">A restrained academic-style summary of relative improvements reported in the D-PACE paper.</desc>
  <rect width="920" height="300" fill="#ffffff"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="58" y="42" font-size="20" font-weight="600" fill="#111827">Relative improvement over DFlash</text>
    <text x="58" y="66" font-size="13" fill="#4b5563">Selected averages from the D-PACE paper; higher is better except training overhead.</text>

    <line x1="300" y1="232" x2="780" y2="232" stroke="#111827" stroke-width="1"/>
    <line x1="300" y1="92" x2="300" y2="232" stroke="#111827" stroke-width="1"/>

    <g font-size="12" fill="#4b5563">
      <line x1="300" y1="232" x2="300" y2="238" stroke="#111827"/>
      <text x="300" y="256" text-anchor="middle">0</text>
      <line x1="460" y1="92" x2="460" y2="232" stroke="#e5e7eb"/>
      <line x1="460" y1="232" x2="460" y2="238" stroke="#111827"/>
      <text x="460" y="256" text-anchor="middle">5%</text>
      <line x1="620" y1="92" x2="620" y2="232" stroke="#e5e7eb"/>
      <line x1="620" y1="232" x2="620" y2="238" stroke="#111827"/>
      <text x="620" y="256" text-anchor="middle">10%</text>
      <line x1="780" y1="92" x2="780" y2="232" stroke="#e5e7eb"/>
      <line x1="780" y1="232" x2="780" y2="238" stroke="#111827"/>
      <text x="780" y="256" text-anchor="middle">15%</text>
      <text x="540" y="282" text-anchor="middle" fill="#374151">relative change</text>
    </g>

    <g font-size="13" fill="#111827">
      <text x="58" y="113">Qwen3-4B avg. speedup</text>
      <line x1="300" y1="108" x2="556" y2="108" stroke="#1f4e79" stroke-width="6" stroke-linecap="butt"/>
      <circle cx="556" cy="108" r="4" fill="#1f4e79"/>
      <text x="570" y="113" fill="#1f4e79">+8.0–9.7%</text>

      <text x="58" y="149">Qwen3-4B avg. emitted length</text>
      <line x1="300" y1="144" x2="642" y2="144" stroke="#1f4e79" stroke-width="6" stroke-linecap="butt"/>
      <circle cx="642" cy="144" r="4" fill="#1f4e79"/>
      <text x="656" y="149" fill="#1f4e79">+8.5–10.7%</text>

      <text x="58" y="185">Cross-target emitted length</text>
      <line x1="300" y1="180" x2="710" y2="180" stroke="#1f4e79" stroke-width="6" stroke-linecap="butt"/>
      <circle cx="710" cy="180" r="4" fill="#1f4e79"/>
      <text x="724" y="185" fill="#1f4e79">+12.5 / +12.8%</text>

      <text x="58" y="221">Training-time overhead</text>
      <line x1="300" y1="216" x2="374" y2="216" stroke="#6b7280" stroke-width="6" stroke-linecap="butt"/>
      <circle cx="374" cy="216" r="4" fill="#6b7280"/>
      <text x="388" y="221" fill="#4b5563">+2.3%</text>
    </g>
  </g>
</svg>
