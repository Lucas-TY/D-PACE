<svg xmlns="http://www.w3.org/2000/svg" width="920" height="320" viewBox="0 0 920 320" role="img" aria-labelledby="title desc">
  <title id="title">D-PACE headline results</title>
  <desc id="desc">Compact chart summarizing paper headline results: Qwen3-4B decoding speedup and emitted length gains, cross-target emitted length gains, and measured training overhead.</desc>
  <defs>
    <linearGradient id="bar" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#2f6df6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-30%" width="120%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="920" height="320" rx="24" fill="#f8fafc"/>
  <text x="38" y="52" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="750" fill="#0f172a">D-PACE paper highlights</text>
  <text x="38" y="82" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" fill="#475569">Dynamic Position-Aware Cross-Entropy improves accepted-length-oriented DFlash training without architecture or inference changes.</text>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" fill="#334155">
    <line x1="250" y1="116" x2="250" y2="268" stroke="#cbd5e1"/>
    <text x="232" y="291" text-anchor="middle" fill="#64748b">0%</text>
    <text x="384" y="291" text-anchor="middle" fill="#64748b">5%</text>
    <text x="536" y="291" text-anchor="middle" fill="#64748b">10%</text>
    <text x="688" y="291" text-anchor="middle" fill="#64748b">15%</text>
    <line x1="384" y1="116" x2="384" y2="268" stroke="#e2e8f0"/>
    <line x1="536" y1="116" x2="536" y2="268" stroke="#e2e8f0"/>
    <line x1="688" y1="116" x2="688" y2="268" stroke="#e2e8f0"/>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" filter="url(#shadow)">
    <text x="38" y="132" font-size="15" font-weight="650" fill="#0f172a">Qwen3-4B avg. SR</text>
    <rect x="250" y="116" width="295" height="28" rx="14" fill="url(#bar)"/>
    <text x="562" y="136" font-size="15" font-weight="700" fill="#0f172a">+8.0% to +9.7%</text>

    <text x="38" y="176" font-size="15" font-weight="650" fill="#0f172a">Qwen3-4B avg. emitted length</text>
    <rect x="250" y="160" width="325" height="28" rx="14" fill="url(#bar)"/>
    <text x="592" y="180" font-size="15" font-weight="700" fill="#0f172a">+8.5% to +10.7%</text>

    <text x="38" y="220" font-size="15" font-weight="650" fill="#0f172a">Cross-target emitted length</text>
    <rect x="250" y="204" width="389" height="28" rx="14" fill="url(#bar)"/>
    <text x="656" y="224" font-size="15" font-weight="700" fill="#0f172a">+12.5% / +12.8%</text>

    <text x="38" y="264" font-size="15" font-weight="650" fill="#0f172a">Training overhead</text>
    <rect x="250" y="248" width="70" height="28" rx="14" fill="#94a3b8"/>
    <text x="337" y="268" font-size="15" font-weight="700" fill="#0f172a">+2.3%</text>
  </g>
</svg>
